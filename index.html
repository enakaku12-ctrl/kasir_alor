<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kasir Pintar - Aplikasi Kasir Online</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <h1>💳 Kasir Pintar</h1>
            <p>Sistem Manajemen Penjualan</p>
        </header>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Product Section -->
            <section class="section products-section">
                <h2>Produk</h2>
                <div class="product-grid" id="productGrid">
                    <!-- Produk akan ditambahkan di sini -->
                </div>
            </section>

            <!-- Cart Section -->
            <section class="section cart-section">
                <h2>Keranjang Belanja</h2>
                <div class="cart-items" id="cartItems">
                    <p class="empty-cart">Keranjang kosong</p>
                </div>
                
                <!-- Cart Summary -->
                <div class="cart-summary">
                    <div class="summary-row">
                        <span>Subtotal:</span>
                        <span id="subtotal">Rp 0</span>
                    </div>
                    <div class="summary-row">
                        <span>Diskon:</span>
                        <input type="number" id="discountInput" min="0" placeholder="Rp 0" class="discount-input">
                    </div>
                    <div class="summary-row">
                        <span>Pajak (10%):</span>
                        <span id="tax">Rp 0</span>
                    </div>
                    <div class="summary-row total">
                        <span>Total:</span>
                        <span id="total">Rp 0</span>
                    </div>
                </div>

                <!-- Action Buttons -->
                <div class="action-buttons">
                    <button class="btn btn-primary" id="checkoutBtn">💰 Checkout</button>
                    <button class="btn btn-secondary" id="clearCartBtn">🗑️ Hapus Semua</button>
                </div>
            </section>
        </div>
    </div>

    <!-- Modal Checkout -->
    <div class="modal" id="checkoutModal">
        <div class="modal-content">
            <span class="close" id="closeModal">&times;</span>
            <h2>Detail Pembayaran</h2>
            <div class="modal-body">
                <div class="modal-row">
                    <label>Total Harga:</label>
                    <span id="modalTotal">Rp 0</span>
                </div>
                <div class="modal-row">
                    <label>Metode Pembayaran:</label>
                    <select id="paymentMethod">
                        <option value="cash">Tunai</option>
                        <option value="card">Kartu Debit/Kredit</option>
                        <option value="transfer">Transfer Bank</option>
                        <option value="ewallet">E-Wallet</option>
                    </select>
                </div>
                <div class="modal-row" id="cashPaymentRow">
                    <label>Jumlah Uang:</label>
                    <input type="number" id="cashAmount" placeholder="Rp 0" min="0">
                </div>
                <div class="modal-row" id="changeRow" style="display:none;">
                    <label>Kembalian:</label>
                    <span id="changeAmount">Rp 0</span>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" id="cancelBtn">Batal</button>
                <button class="btn btn-success" id="confirmPaymentBtn">✓ Selesaikan Pembayaran</button>
            </div>
        </div>
    </div>

    <!-- Success Modal -->
    <div class="modal" id="successModal">
        <div class="modal-content">
            <div class="success-icon">✓</div>
            <h2>Pembayaran Berhasil!</h2>
            <p id="successMessage"></p>
            <button class="btn btn-primary" id="newTransactionBtn">Transaksi Baru</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
